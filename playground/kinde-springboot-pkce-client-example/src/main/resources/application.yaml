spring:
  security:
    oauth2:
      client:
        provider:
          kinde:
            issuer-uri: ${KINDE_DOMAIN:https://your-domain.kinde.com}
        registration:
          # Registration id intentionally set to "kinde" so Spring's default callback
          # (/login/oauth2/code/kinde) lines up with the redirect URI already registered
          # on the Kinde application. PKCE is force-enabled by the custom
          # ServerOAuth2AuthorizationRequestResolver in OAuth2ClientConfiguration.
          kinde:
            provider: kinde
            client-id: ${KINDE_CLIENT_ID:your-client-id-here}
            client-secret: ${KINDE_CLIENT_SECRET:your-client-secret-here}
            scope: openid,email
