<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>KindeAuth</title>
    <link rel="stylesheet" type="text/css" th:href="@{/index.css}" />

</head>
<body>
<header>
    <nav class="nav container">
        <h1 class="text-display-3">KindeAuth</h1>
        <div>
            <button class="btn btn-ghost sign-in-btn" onclick="redirectToLogin()">Sign in</button>
            <button class="btn btn-dark" onclick="redirectToRegistration()">Sign up</button>
        </div>
    </nav>
</header>

<main>
    <div class="container">
        <div class="card hero">
            <p class="text-display-1 hero-title">
                Let's start authenticating <br/> with KindeAuth
            </p>
            <p class="text-body-1 hero-tagline">Configure your app</p>

            <a href="https://kinde.com/docs/developer-tools/react-sdk"
               target="_blank" rel="noreferrer"
               class="btn btn-light btn-big">
                Go to docs
            </a>
        </div>

        <div class="card" style="margin-top: 2rem;">
            <p class="text-heading-1">Team Invitation</p>
            <p class="text-body-1" style="margin-bottom: 1rem;">
                Enter an invitation code to accept a team invitation.
            </p>
            <form onsubmit="redirectWithInvitation(event)" style="display: flex; gap: 0.5rem; align-items: center;">
                <input type="text" id="invitationCode" placeholder="inv_xxxxxxxx"
                       style="padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;" />
                <button type="submit" class="btn btn-dark">Accept Invitation</button>
            </form>
        </div>
    </div>
</main>

<footer class="footer">
    <div class="container">
        <strong class="text-heading-2">KindeAuth</strong>
        <p class="footer-tagline text-body-3">
            Visit our
            <a class="link" href="https://kinde.com/docs">help center</a>
        </p>

        <small class="text-subtle">
            &copy; 2023 KindeAuth, Inc. All rights reserved
        </small>
    </div>
</footer>

<script th:inline="javascript">
    function redirectToLogin() {
        window.location.href = "/home";
    }
</script>
<script th:inline="javascript">
    function redirectToRegistration() {
        window.location.href = "/registration";
    }
</script>
<script th:inline="javascript">
    function redirectWithInvitation(event) {
        event.preventDefault();
        var code = document.getElementById('invitationCode').value;
        if (code) {
            window.location.href = "/oauth2/authorization/kinde?invitation_code=" + encodeURIComponent(code);
        }
    }
</script>
</body>
</html>
